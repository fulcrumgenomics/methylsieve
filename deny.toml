# cargo-deny configuration for methylsieve.
#
# Run locally: `cargo deny check`
# CI:          `.github/workflows/deny.yml` (weekly + on PR)
#
# Schema docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories: fail on known CVEs, unmaintained crates, yanked versions.
# Pulls from https://github.com/RustSec/advisory-db
# ---------------------------------------------------------------------------
[advisories]
version = 2
yanked = "warn"
ignore = [
    # ttf-parser is unmaintained (the author declared it so; no maintained
    # successor exists yet). It is a transitive dependency of the PDF-plotting
    # stack we don't control (kuva → svg2pdf → fontdb / usvg / rustybuzz), and
    # this is an unmaintained notice, not a vulnerability. Revisit when the
    # plotting stack moves off it.
    "RUSTSEC-2026-0192",
]

# ---------------------------------------------------------------------------
# Licenses: only permissive MIT-compatible licenses are allowed. Anything
# weak/strong copyleft (LGPL, GPL, AGPL, MPL) or proprietary will fail the
# check. The allow-list pre-approves the common permissive licenses we accept,
# whether or not a current dependency happens to use each one — so a routine dep
# bump that pulls in, say, a BSD-3-Clause or ISC crate stays green with no config
# change. `unused-allowed-license = "allow"` silences cargo-deny's cosmetic
# "license not encountered" notice for the pre-approved entries no crate carries.
# ---------------------------------------------------------------------------
[licenses]
version = 2
confidence-threshold = 0.93
unused-allowed-license = "allow"
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

# ---------------------------------------------------------------------------
# Bans: control duplicate versions and ban specific crates.
# `multiple-versions = "warn"` because some duplication is normal in a
# healthy dep tree (e.g. proc-macro libs that bridge syn 1.x → 2.x).
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources: deps must come from a known registry / git host. Defends against
# typo-squatting and accidental forks.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
